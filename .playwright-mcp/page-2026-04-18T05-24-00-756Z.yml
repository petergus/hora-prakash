        - heading "There are two different types of charts in Vedic Astrology. The “North Indian” chart and “South Indian” chart." [level=2] [ref=e94]
        - figure "North Indian Chart You read a North Indian chart counter clockwise and the houses will stay fixed." [ref=e97]:
          - img "Instagram Post (24).png" [ref=e101]
          - generic [ref=e103]:
            - paragraph [ref=e106]: North Indian Chart
            - paragraph [ref=e109]: You read a North Indian chart counter clockwise and the houses will stay fixed.
        - paragraph [ref=e113]:
          - text: The North Indian chart is what I was taught on, teach with, and use.
          - strong [ref=e114]: What’s important to remember about a North Indian chart is that the houses are fixed.
          - text: The houses will never change. You read the chart counter clock wise, with the first house being the top middle diamond. Where you see “Lagna” in the top diamond, that is synonymous with “rising sign” or “ascendant”. The first house, lagna, ascendant, and rising sign will always be located in that top middle diamond when deciphering a North Indian chart. What ever number you see in that top diamond will represent which sign was on your ascendant at the moment of your birth. For example, if you see a number 8, it means your rising sign is the 8th sign of the zodiac. The 8th sign of the zodiac is Scorpio. You would then be a scorpio ascendant. You will then count counter clockwise to learn which signs govern which house. If you’re scorpio rising, you count to the left, to where you see “H2”. That is your second house and should have the number 9 or Sagittarius ruling that house.
        - figure "South Indian Chart You read a South Indian chart clockwise and the signs will stay fixed." [ref=e117]:
          - img "south-chart.png" [ref=e121]
          - generic [ref=e123]:
            - paragraph [ref=e126]: South Indian Chart
            - paragraph [ref=e129]: You read a South Indian chart clockwise and the signs will stay fixed.
        - generic [ref=e132]:
          - paragraph [ref=e133]:
            - text: The next chart is the South Indian chart.
            - strong [ref=e134]: What’s important to remember about the South Indian chart is that signs do not change.
            - text: Pisces will always govern the top left square. Wherever you see a dash through a house, that will be the ascendant. For example, if you see a dash through gemini, that means you’re a gemini rising. You will then count
            - strong [ref=e135]: clockwise
            - text: . Gemini would be the first house, per being the rising sign, Cancer would be the second house, Leo would be the third, so on and so forth.
          - paragraph [ref=e136]
          - paragraph [ref=e137]:
            - strong [ref=e138]: In conclusion, the biggest difference from South Indian and North Indian charts, is that in the North Indian chart, the houses stay fixed and you read counter clockwise. In the South Indian chart, the signs stay fixed and you read clockwise.
