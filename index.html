<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hora Prakash</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <!-- Preload the large ephemeris files so the browser fetches them in parallel with JS -->
  <link rel="preload" href="/hora-prakash/wasm/swisseph.wasm" as="fetch" crossorigin>
  <link rel="preload" href="/hora-prakash/wasm/swisseph.data" as="fetch" crossorigin>
  <link rel="stylesheet" href="/src/style.css" />
  <!-- Inline loader styles — render before any JS or external CSS -->
  <style>
    #app-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 55vh;
      gap: 1.1rem;
    }
    .app-spinner {
      width: 38px;
      height: 38px;
      border: 3px solid #e2e8f0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: hp-spin 0.75s linear infinite;
    }
    @keyframes hp-spin { to { transform: rotate(360deg); } }
    .app-loader-text {
      color: #94a3b8;
      font-size: 0.88rem;
      font-family: system-ui, -apple-system, sans-serif;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <header>
    <h1><img src="/icon.svg" alt="" style="width:36px;height:36px;vertical-align:middle;margin-right:0.5rem;border-radius:8px" />Hora Prakash</h1>
    <nav id="tab-nav">
      <button data-tab="input" class="tab-btn active">Birth Details</button>
      <button data-tab="chart" class="tab-btn" disabled>Birth Chart</button>
      <button data-tab="dasha" class="tab-btn" disabled>Dasha</button>
      <button data-tab="panchang" class="tab-btn" disabled>Panchang</button>
    </nav>
  </header>
  <main>
    <div id="app-loader">
      <div class="app-spinner"></div>
      <span class="app-loader-text">Loading ephemeris…</span>
    </div>
    <section id="tab-input" class="tab-panel active" style="display:none"></section>
    <section id="tab-chart" class="tab-panel"></section>
    <section id="tab-dasha" class="tab-panel"></section>
    <section id="tab-panchang" class="tab-panel"></section>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
